server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  add_header Cache-Control "no-cache";

  location / {
    try_files $uri $uri/ =404;
  }

  # ico/ 目录列表（供编辑器图标选择器使用，JSON 格式）
  location /ico/ {
    autoindex on;
    autoindex_format json;
    autoindex_exact_size off;
    try_files $uri $uri/ =404;
  }

  location ~* \.(yml|yaml)$ {
    types { text/plain yaml; }
    default_type text/plain;
    try_files $uri =404;
  }
}
