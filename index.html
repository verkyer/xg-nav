<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="一个简洁、纯静态的个人导航站">
<meta name="keywords" content="xg-nav,纯静态导航,简约导航">
<title>XG🧭导航 - 一个简洁、纯静态的个人导航站</title>

<!-- 关键CSS内联，避免阻塞渲染 -->
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg-color);color:var(--text-color);transition:background-color 0.3s,color 0.3s}:root{--bg-color:#f7f8fa;--text-color:#0f172a;--border-color:#e2e8f0;--card-bg:rgba(255,255,255,0.82);--card-shadow:0 1px 1px rgba(15,23,42,0.04),0 10px 30px rgba(15,23,42,0.06)}[data-theme="dark"]{--bg-color:#0b1220;--text-color:#e5e7eb;--border-color:#1e293b;--card-bg:rgba(17,24,39,0.82);--card-shadow:0 1px 1px rgba(0,0,0,0.25),0 18px 60px rgba(0,0,0,0.45)}.loading{text-align:center;padding:2rem;font-size:2rem}.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border-color);border-radius:50%;border-top-color:var(--text-color);animation:spin 1s ease-in-out infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>

<!-- 预加载关键资源 -->
<link rel="preload" href="css/style.css?v=1.0.1" as="style">
<link rel="preload" href="js/nav.js?v=1.0.0" as="script">
<link rel="preload" href="config.json" as="fetch" crossorigin>
<link rel="preload" href="data/links.yaml" as="fetch" crossorigin>

<!-- 异步加载完整CSS -->
<link rel="stylesheet" href="css/style.css?v=1.0.1" media="print" onload="this.media='all';this.onload=null">
<noscript><link rel="stylesheet" href="css/style.css?v=1.0.1"></noscript>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
</head>
<body>
<header id="top"><h1></h1></header>
<button id="theme-toggle" aria-label="切换深浅色模式">🌗</button>
<button id="back-to-top" aria-label="返回顶部">👆</button>

<div class="search-container">
  <div class="search-box">
    <button type="button" class="search-engine-trigger" id="search-engine-trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="选择搜索引擎">
      <span class="search-engine-trigger-icon" id="search-engine-trigger-icon"></span>
      <svg class="search-engine-trigger-caret" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
        <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="search-input-area">
      <input type="text" class="search-input" id="search-input" placeholder="搜索或输入网址..." autocomplete="off">
      <button class="search-clear" id="search-clear" aria-label="清空搜索">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <button class="search-button" id="search-button" aria-label="搜索">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </button>
  </div>
  <div class="search-engine-dropdown" id="search-engine-dropdown" role="listbox" aria-label="搜索引擎列表" hidden></div>
  <div class="search-results-count" id="search-results-count"></div>
</div><main id="nav-container"><div class="loading">⚡ 加载中...</div></main><footer><small></small></footer>

  <script src="lib/js-yaml.min.js" defer></script>
  <script src="js/nav.js?v=1.0.0" defer></script>
</body>
</html>
